services:
  app:
    build:
      context: .
      dockerfile: user/Dockerfile
      target: dev
    ports:
      - '3000:3000'
    env_file:
      - ./.env
    environment:
      - LOKI_URL=http://loki:3100
      - USER_INFO_SERVICE_URL=http://user-info:3000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=user
    volumes:
      - ./user/src:/app/user/src
      - ./user/logs:/app/user/logs
    depends_on:
      - loki
      - user-info
      - otel-collector
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 2s
      timeout: 5s
      start_period: 15s
      retries: 5

  user-info:
    build:
      context: .
      dockerfile: user-info/Dockerfile
      target: dev
    ports:
      - '3002:3000'
    env_file:
      - ./.env
    environment:
      - LOKI_URL=http://loki:3100
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=user-info
    volumes:
      - ./user-info/src:/app/user-info/src
      - ./user-info/logs:/app/user-info/logs
    depends_on:
      - loki
      - otel-collector
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    ports:
      - '4317:4317'
      - '4318:4318'
    volumes:
      - ./otel-collector/otel-collector-config.yml:/etc/otelcol/config.yml:ro
    command: ['--config=/etc/otelcol/config.yml']
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.3.1
    ports:
      - '3200:3200'
    volumes:
      - ./tempo/tempo-config.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    command: ['-config.file=/etc/tempo.yml']
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.4
    ports:
      - '3100:3100'
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.2
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    restart: unless-stopped

  k6:
    image: grafana/k6:latest
    profiles: [load]
    volumes:
      - ./scripts:/scripts
    environment:
      - K6_BASE_URL=http://app:3000
      - DURATION=${DURATION:-999h}
    depends_on:
      app:
        condition: service_healthy
    command: run /scripts/load.js

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - '3001:3000'
    depends_on:
      - loki
      - tempo
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  grafana_data:
  tempo_data:
