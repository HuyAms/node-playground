global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: user-management
    static_configs:
      - targets:
          - app:3000

  - job_name: user-info
    static_configs:
      - targets:
          - user-info:3000

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
